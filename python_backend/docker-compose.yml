version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    command: npm run dev
